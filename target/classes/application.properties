# ================================
# Auction System - Application Properties
# ================================

spring.application.name=Auction System

# Server
server.port=8080

# H2 Database (Development)
spring.datasource.url=jdbc:h2:file:./data/auctiondb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# Logging
logging.level.com.auction=DEBUG
logging.level.org.springframework.security=INFO

# ================================
# To switch to MySQL (Production):
# ================================
# spring.datasource.url=jdbc:mysql://localhost:3306/auctiondb?useSSL=false&serverTimezone=UTC
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
