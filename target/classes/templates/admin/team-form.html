<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Team Form')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">
                        <i class="bi" th:classappend="${team?.id != null} ? 'bi-pencil-square' : 'bi-shield-plus'"></i>
                        <span th:text="${team?.id != null} ? 'Edit Team' : 'Create New Team'">Team Form</span>
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="${team?.id != null} ? @{/admin/teams/edit/{id}(id=${team.id})} : @{/admin/teams/add}"
                          method="post" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Team Name *</label>
                            <input type="text" class="form-control" name="name" required
                                   th:value="${team?.name}"
                                   placeholder="Enter team name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Total Budget (₹) *</label>
                            <input type="number" class="form-control" name="budget" required
                                   min="10000" step="10000"
                                   th:value="${team?.totalBudget ?: 500000}"
                                   placeholder="Enter budget allocation">
                            <small class="text-muted" th:if="${team?.id != null}">
                                Current remaining: ₹<span th:text="${#numbers.formatDecimal(team.remainingBudget, 0, 0)}">0</span>
                                &mdash; changing total budget adjusts remaining proportionally.
                            </small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Team Owner(s) *</label>
                            <select name="ownerIds" class="form-select" required multiple size="5">
                                <option th:each="user : ${users}"
                                        th:value="${user.id}"
                                        th:text="${user.fullName + ' (' + user.username + ')'}"
                                        th:selected="${team?.owners != null && team.owners.![id].contains(user.id)}">
                                    Owner
                                </option>
                            </select>
                            <small class="text-muted">Hold Ctrl / Cmd to select multiple owners</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Team Logo</label>
                            <!-- Show existing logo when editing -->
                            <div th:if="${team?.logoPath != null and !team.logoPath.equals('default-logo.png')}" class="mb-2">
                                <img th:src="@{/uploads/{img}(img=${team.logoPath})}"
                                     alt="Current Logo"
                                     class="rounded border"
                                     style="width:80px;height:80px;object-fit:contain;"
                                     onerror="this.style.display='none'">
                                <small class="text-muted d-block">Current logo (upload new to replace)</small>
                            </div>
                            <input type="file" class="form-control" name="logoFile" accept="image/*">
                            <small class="text-muted">Upload a PNG/JPG logo for your team. Recommended: 200×200 px.</small>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-circle"></i>
                                <span th:text="${team?.id != null} ? 'Update Team' : 'Create Team'">Save</span>
                            </button>
                            <a th:href="@{/admin/teams}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Back
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
