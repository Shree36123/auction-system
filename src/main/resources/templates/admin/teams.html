<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Teams')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-shield"></i> Teams</h2>
        <div class="d-flex gap-2">
            <button class="btn btn-info" type="button" data-bs-toggle="collapse" data-bs-target="#importTeamSection">
                <i class="bi bi-file-earmark-excel"></i> Import from Excel
            </button>
            <a th:href="@{/admin/teams/add}" class="btn btn-success">
                <i class="bi bi-shield-plus"></i> Add Team
            </a>
        </div>
    </div>

    <!-- Excel Import Section -->
    <div class="collapse mb-3" id="importTeamSection">
        <div class="card card-body">
            <form th:action="@{/admin/teams/import-excel}" method="post" enctype="multipart/form-data" class="d-flex align-items-end gap-3">
                <div class="flex-grow-1">
                    <label class="form-label fw-bold">Upload Excel File (.xlsx)</label>
                    <input type="file" name="excelFile" class="form-control" accept=".xlsx,.xls" required />
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-upload"></i> Import Teams
                </button>
            </form>
            <div class="mt-2">
                <small class="text-muted">
                    Expected columns: <strong>Name</strong> (team name), <strong>Budget</strong> (defaults to 100000),
                    <strong>Owner</strong> (username(s) of existing users, comma-separated for multiple), <strong>Logo</strong> (optional)
                </small>
            </div>
        </div>
    </div>

    <!-- Flash Messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Teams Grid -->
    <div class="row g-4">
        <div class="col-md-6" th:each="team : ${teams}">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-2">
                        <!-- Team Logo -->
                        <img th:if="${team.logoPath != null and !team.logoPath.equals('default-logo.png')}"
                             th:src="@{/uploads/{img}(img=${team.logoPath})}"
                             alt="Logo"
                             style="width:40px;height:40px;object-fit:contain;background:#fff;border-radius:6px;padding:3px;"
                             onerror="this.style.display='none'">
                        <i th:unless="${team.logoPath != null and !team.logoPath.equals('default-logo.png')}"
                           class="bi bi-shield-fill"></i>
                        <h5 class="mb-0" th:text="${team.name}">Team Name</h5>
                    </div>
                    <span class="badge bg-light text-dark"
                          th:text="${team.playerCount} + ' / 9 Players'">0/9</span>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-6">
                            <small class="text-muted">Owner(s)</small>
                            <p class="fw-bold mb-0" th:text="${team.ownerNames}">Owner</p>
                        </div>
                        <div class="col-6">
                            <small class="text-muted">Slots Remaining</small>
                            <p class="fw-bold mb-0" th:text="${team.slotsRemaining}">9</p>
                        </div>
                    </div>

                    <!-- Budget Bar -->
                    <div class="mb-3">
                        <div class="d-flex justify-content-between small">
                            <span>Budget Used</span>
                            <span>
                                ₹<span th:text="${#numbers.formatDecimal(team.spentBudget, 0, 0)}">0</span>
                                / ₹<span th:text="${#numbers.formatDecimal(team.totalBudget, 0, 0)}">0</span>
                            </span>
                        </div>
                        <div class="progress mt-1" style="height: 10px;">
                            <div class="progress-bar bg-success" role="progressbar"
                                 th:style="'width: ' + ${(team.spentBudget / team.totalBudget) * 100} + '%'"></div>
                        </div>
                        <div class="text-end mt-1">
                            <small class="text-success fw-bold">
                                Remaining: ₹<span th:text="${#numbers.formatDecimal(team.remainingBudget, 0, 0)}">0</span>
                            </small>
                        </div>
                    </div>

                    <!-- Player List -->
                    <div th:if="${!team.players.isEmpty()}">
                        <h6>Players Bought:</h6>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between py-1"
                                th:each="player : ${team.players}">
                                <span>
                                    <span th:text="${player.fullName}">Player</span>
                                    <span class="badge bg-secondary ms-1" th:text="${player.category.label}">Cat</span>
                                </span>
                                <span class="text-primary">₹<span th:text="${#numbers.formatDecimal(player.soldPrice, 0, 0)}">0</span></span>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="card-footer d-flex gap-2">
                    <a th:href="@{/admin/teams/{id}(id=${team.id})}" class="btn btn-sm btn-info">
                        <i class="bi bi-eye"></i> Details
                    </a>                    <a th:href="@{/admin/teams/edit/{id}(id=${team.id})}" class="btn btn-sm btn-warning">
                        <i class="bi bi-pencil"></i> Edit
                    </a>                    <form th:action="@{/admin/teams/delete/{id}(id=${team.id})}" method="post"
                          onsubmit="return confirm('Delete this team? All player assignments will be lost.');">
                        <button type="submit" class="btn btn-sm btn-danger">
                            <i class="bi bi-trash"></i> Delete
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
