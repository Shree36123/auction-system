<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Add/Edit Player')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="bi bi-person-plus"></i>
                        <span th:text="${player.id != null} ? 'Edit Player' : 'Register New Player'">Add Player</span>
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="${player.id != null} ? @{/admin/players/edit/{id}(id=${player.id})} : @{/admin/players/add}"
                          method="post" enctype="multipart/form-data">

                        <div class="row g-3">
                            <div class=\"col-md-12\">
                                <label class="form-label fw-semibold">Full Name *</label>
                                <input type="text" class="form-control" name="fullName"
                                       th:value="${player.fullName}" required placeholder="Enter full name">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Phone Number *</label>
                                <input type="tel" class="form-control" name="phoneNumber"
                                       th:value="${player.phoneNumber}" required placeholder="Enter phone number">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Jersey Size</label>
                                <select name="jerseySize" class="form-select">
                                    <option value="">Select Size</option>
                                    <option value="S" th:selected="${player.jerseySize == 'S'}">S</option>
                                    <option value="M" th:selected="${player.jerseySize == 'M'}">M</option>
                                    <option value="L" th:selected="${player.jerseySize == 'L'}">L</option>
                                    <option value="XL" th:selected="${player.jerseySize == 'XL'}">XL</option>
                                    <option value="XXL" th:selected="${player.jerseySize == 'XXL'}">XXL</option>
                                    <option value="XXXL" th:selected="${player.jerseySize == 'XXXL'}">XXXL</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Base Price (₹)</label>
                                <input type="number" class="form-control" name="basePrice"
                                       th:value="${player.basePrice}" min="0" step="500"
                                       placeholder="Enter base price">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Professional Image</label>
                                <div th:if="${player.profileImagePath != null}" class="mb-2">
                                    <!-- Support both local file uploads and external URLs (e.g. Google Drive) -->
                                    <img th:src="${player.profileImagePath.startsWith('http') ? player.profileImagePath : '/uploads/' + player.profileImagePath}"
                                         alt="Current Photo"
                                         class="rounded border"
                                         style="width:100px;height:100px;object-fit:cover;"
                                         onerror="this.style.display='none'">
                                    <div class="mt-1">
                                        <small class="text-muted">Current image (upload new to replace)</small>
                                    </div>
                                </div>
                                <input type="file" class="form-control" name="image" accept="image/*">
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-semibold">Achievements</label>
                                <textarea class="form-control" name="achievements" rows="3"
                                          th:text="${player.achievements}"
                                          placeholder="List achievements, awards, experience..."></textarea>
                            </div>

                            <div class="col-12">
                                <div class="alert alert-info mb-0">
                                    <i class="bi bi-info-circle"></i>
                                    <strong>Category is auto-assigned</strong> when not specified.
                                </div>
                            </div>
                        </div>

                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i>
                                <span th:text="${player.id != null} ? 'Update Player' : 'Register Player'">Save</span>
                            </button>
                            <a th:href="@{/admin/players}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Back
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
