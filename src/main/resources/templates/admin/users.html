<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Users')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-person-gear"></i> Users</h2>
        <div class="d-flex gap-2">
            <button class="btn btn-success" type="button" data-bs-toggle="collapse" data-bs-target="#importUserSection">
                <i class="bi bi-file-earmark-excel"></i> Import from Excel
            </button>
            <a th:href="@{/admin/users/add}" class="btn btn-info">
                <i class="bi bi-person-plus"></i> Add User
            </a>
        </div>
    </div>

    <!-- Excel Import Section -->
    <div class="collapse mb-3" id="importUserSection">
        <div class="card card-body">
            <form th:action="@{/admin/users/import-excel}" method="post" enctype="multipart/form-data" class="d-flex align-items-end gap-3">
                <div class="flex-grow-1">
                    <label class="form-label fw-bold">Upload Excel File (.xlsx)</label>
                    <input type="file" name="excelFile" class="form-control" accept=".xlsx,.xls" required />
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-upload"></i> Import Users
                </button>
            </form>
            <div class="mt-2">
                <small class="text-muted">
                    Expected columns: <strong>Username</strong>, <strong>Password</strong> (optional, defaults to username+123),
                    <strong>Full Name</strong> (optional), <strong>Role</strong> (admin / owner, defaults to TEAM_OWNER)
                </small>
            </div>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="table-responsive">
        <table class="table table-hover table-bordered bg-white shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Username</th>
                    <th>Full Name</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user, stat : ${users}">
                    <td th:text="${stat.count}">1</td>
                    <td th:text="${user.username}">username</td>
                    <td class="fw-bold" th:text="${user.fullName}">Name</td>
                    <td>
                        <span class="badge"
                              th:classappend="${user.role.name() == 'ADMIN'} ? 'bg-danger' : 'bg-primary'"
                              th:text="${user.role}">Role</span>
                    </td>
                    <td>
                        <span class="badge" th:classappend="${user.enabled} ? 'bg-success' : 'bg-secondary'"
                              th:text="${user.enabled} ? 'Active' : 'Disabled'">Active</span>
                    </td>
                    <td>
                        <div class="btn-group btn-group-sm">
                            <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn btn-warning">
                                <i class="bi bi-pencil"></i> Edit
                            </a>
                            <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post"
                                  onsubmit="return confirm('Delete user ' + this.dataset.name + '?');"
                                  th:data-name="${user.username}" class="d-inline">
                                <button type="submit" class="btn btn-danger btn-sm">
                                    <i class="bi bi-trash"></i> Delete
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="6" class="text-center text-muted py-4">No users found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
