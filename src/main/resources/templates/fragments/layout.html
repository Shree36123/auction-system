<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Auction System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- Navigation -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-trophy-fill text-warning"></i> Auction System
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"><i class="bi bi-house"></i> Home</a>
                </li>

                <!-- Admin Links -->
                <li class="nav-item" th:if="${userRole == 'ADMIN'}">
                    <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
                </li>
                <li class="nav-item" th:if="${userRole == 'ADMIN'}">
                    <a class="nav-link" th:href="@{/admin/players}"><i class="bi bi-people"></i> Players</a>
                </li>
                <li class="nav-item" th:if="${userRole == 'ADMIN'}">
                    <a class="nav-link" th:href="@{/admin/teams}"><i class="bi bi-shield"></i> Teams</a>
                </li>
                <li class="nav-item" th:if="${userRole == 'ADMIN'}">
                    <a class="nav-link" th:href="@{/admin/auction}"><i class="bi bi-hammer"></i> Auction</a>
                </li>
                <li class="nav-item" th:if="${userRole == 'ADMIN'}">
                    <a class="nav-link" th:href="@{/admin/users}"><i class="bi bi-person-gear"></i> Users</a>
                </li>

                <!-- Owner Links -->
                <li class="nav-item" th:if="${userRole == 'TEAM_OWNER'}">
                    <a class="nav-link" th:href="@{/owner/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
                </li>
                <li class="nav-item" th:if="${userRole == 'TEAM_OWNER'}">
                    <a class="nav-link" th:href="@{/owner/players}"><i class="bi bi-people"></i> Available Players</a>
                </li>
                <li class="nav-item" th:if="${userRole == 'TEAM_OWNER'}">
                    <a class="nav-link" th:href="@{/owner/team}"><i class="bi bi-shield"></i> My Team</a>
                </li>
            </ul>

            <ul class="navbar-nav">
                <li class="nav-item" th:if="${loggedInUser == null}">
                    <a class="nav-link" th:href="@{/login}"><i class="bi bi-box-arrow-in-right"></i> Login</a>
                </li>
                <li class="nav-item" th:if="${loggedInUser != null}">
                    <span class="nav-link text-light">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${loggedInUser}">User</span>
                    </span>
                </li>
                <li class="nav-item" th:if="${loggedInUser != null}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm nav-link">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Footer -->
<footer th:fragment="footer" class="bg-dark text-light py-3 mt-5">
    <div class="container text-center">
        <p class="mb-0">&copy; 2026 Auction System. All Rights Reserved.</p>
    </div>
</footer>

<script th:fragment="scripts"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
